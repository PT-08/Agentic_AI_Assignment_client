@if (visible) {
  <div class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white/70 backdrop-blur-sm transition-all duration-300 animate-fade-in">
    
    <div class="flex flex-col items-center gap-4 p-6 max-w-xs text-center">
      <p-progressSpinner 
        styleClass="w-12 h-12" 
        strokeWidth="3" 
        fill="transparent" 
        animationDuration=".8s">
      </p-progressSpinner>
      
      @if (message) {
        <p class="text-xs font-medium tracking-wide text-slate-500 font-sans animate-pulse">
          {{ message }}
        </p>
      }
    </div>

  </div>
}
